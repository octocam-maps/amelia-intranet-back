# Stack de desarrollo local (Postgres + backend con --reload).
# Uso: docker compose -f docker-compose.local.yaml --profile local up
services:
  amelia-intranet-database:
    image: postgres:17-bookworm
    container_name: amelia-intranet-database
    profiles: [local]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      # Esquema completo autocontenido — Postgres lo ejecuta en el primer
      # arranque (volumen vacío). Las migraciones de ./database/migrations son
      # el registro incremental para bases ya existentes (se aplican a mano);
      # su estado final está reflejado en init.sql.
      - ./database/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - amelia-intranet-network

  amelia-intranet-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amelia-intranet-backend
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      amelia-intranet-database:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Hot-reload de desarrollo: monta el código del host para que
      # uvicorn --reload recoja los cambios sin reconstruir la imagen.
      # Se montan solo `src/` y `main.py` para NO pisar `/app/deps`
      # (las dependencias instaladas en la imagen). NO usar en prod.
      - ./src:/app/src
      - ./main.py:/app/main.py
      # Credencial de la Service Account de Google Drive (Fase 4, solo local).
      # Read-only; la ruta dentro del contenedor la consume
      # GOOGLE_SERVICE_ACCOUNT_KEY_PATH del .env. El archivo está gitignored.
      - ./secrets/sa-drive.json:/app/secrets/sa-drive.json:ro
    environment:
      UVICORN_RELOAD: ${UVICORN_RELOAD:-true}
    command: ["python", "run_server.py"]
    networks:
      - amelia-intranet-network

volumes:
  postgres_data:

networks:
  amelia-intranet-network:
    driver: bridge
